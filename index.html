<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Playground</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    
    <!-- 1. CSS SECTION (You can move this to style.css) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --indigo-primary: #4338ca;
        }

        .code-font {
            font-family: 'Fira Code', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        #editor {
            min-height: 200px;
            resize: vertical;
        }

        /* Toast Animation */
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        .toast-msg {
            animation: slideUp 0.3s ease-out forwards;
            position: fixed;
            bottom: 24px;
            left: 50%;
            z-index: 100;
        }

        @media (max-width: 640px) {
            .mobile-padding { padding: 1rem; }
            button { min-height: 44px; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- 2. HTML SECTION -->
    <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white/20 p-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                    </svg>
                </div>
                <h1 class="text-lg font-bold">SQL Playground</h1>
            </div>
            <div class="hidden sm:block px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/20">
                SQLite WASM Engine
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 flex flex-col lg:flex-row gap-6">
        
        <!-- Sidebar -->
        <aside class="w-full lg:w-80 flex flex-col gap-4 order-2 lg:order-1">
            <div class="bg-indigo-900 text-indigo-100 rounded-xl shadow-md overflow-hidden">
                <div class="p-4 bg-indigo-800/50 border-b border-indigo-700">
                    <h2 class="font-bold text-xs uppercase tracking-widest flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Quick Start Guide
                    </h2>
                </div>
                <div class="p-4 space-y-4 text-xs">
                    <p><strong class="text-white">Run SQL:</strong> Type in the editor and hit "Run". Try <code>SELECT * FROM Users;</code></p>
                    <p><strong class="text-white">Schema:</strong> Click table names below to see columns.</p>
                    <div class="pt-2 border-t border-indigo-700/50">
                        <button onclick="resetDatabase()" class="w-full py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded shadow-sm transition-all active:scale-95">
                            Reset & Refresh
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-grow min-h-[300px]">
                <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <h2 class="font-bold text-slate-500 text-[10px] uppercase tracking-widest">Database Schema</h2>
                </div>
                <div id="schema-list" class="p-4 space-y-3 overflow-y-auto custom-scrollbar">
                    <div class="text-slate-400 text-sm animate-pulse">Loading engine...</div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <section class="flex-grow flex flex-col gap-6 order-1 lg:order-2">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                <div class="flex items-center justify-between px-4 py-2 border-b border-slate-100 bg-slate-50">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">SQL Editor</span>
                    <div class="flex items-center space-x-2">
                        <button onclick="clearEditor()" class="text-xs font-medium text-slate-400 hover:text-slate-600 px-2 py-1">Clear</button>
                        <button onclick="runQuery()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md transition-all active:scale-95 flex items-center">
                            Run Query
                        </button>
                    </div>
                </div>
                <textarea id="editor" spellcheck="false" class="p-4 w-full code-font text-indigo-950 focus:outline-none text-base bg-white" placeholder="-- Enter SQL here..."></textarea>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex-grow flex flex-col overflow-hidden min-h-[400px]">
                <div class="px-4 py-3 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Execution Results</span>
                    <span id="result-meta" class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded">Idle</span>
                </div>
                
                <div id="results-container" class="flex-grow overflow-auto custom-scrollbar">
                    <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-300 p-8">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <p>Waiting for query...</p>
                    </div>
                    <div id="error-box" class="hidden m-6 p-4 bg-red-50 border-l-4 border-red-500 rounded text-red-700 text-sm code-font"></div>
                    <div id="table-wrapper" class="hidden min-w-full"><table class="w-full text-left border-collapse"><thead id="table-head" class="bg-slate-50 sticky top-0"></thead><tbody id="table-body" class="divide-y divide-slate-100"></tbody></table></div>
                    <div id="success-box" class="hidden m-12 text-center">
                        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                        </div>
                        <p id="success-text" class="text-slate-600 font-medium"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="pointer-events-none"></div>

    <!-- 3. JAVASCRIPT SECTION (You can move this to script.js) -->
    <script>
        let db;
        let SQLInstance;
        const dom = {
            editor: document.getElementById('editor'),
            empty: document.getElementById('empty-state'),
            error: document.getElementById('error-box'),
            table: document.getElementById('table-wrapper'),
            success: document.getElementById('success-box'),
            successText: document.getElementById('success-text'),
            head: document.getElementById('table-head'),
            body: document.getElementById('table-body'),
            schema: document.getElementById('schema-list'),
            meta: document.getElementById('result-meta'),
            toasts: document.getElementById('toast-container')
        };

        async function init() {
            try {
                const config = { locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` };
                SQLInstance = await initSqlJs(config);
                db = new SQLInstance.Database();
                seed();
                updateUI();
                
                if (sessionStorage.getItem('reset_toast')) {
                    sessionStorage.removeItem('reset_toast');
                    toast("Database Factory Reset Successful");
                }
            } catch (e) {
                dom.schema.innerHTML = `<div class="text-red-500 text-xs">Engine Error: ${e.message}</div>`;
            }
        }

        function seed() {
            db.run(`
                CREATE TABLE Users (id INTEGER PRIMARY KEY, name TEXT, email TEXT);
                INSERT INTO Users VALUES (1, 'Alice Johnson', 'alice@example.com'), (2, 'Bob Smith', 'bob@example.com');
                CREATE TABLE Products (id INTEGER PRIMARY KEY, name TEXT, price DECIMAL);
                INSERT INTO Products VALUES (1, 'Laptop', 1200), (2, 'Phone', 800);
            `);
        }

        function toast(msg, type='success') {
            const el = document.createElement('div');
            el.className = `toast-msg px-6 py-3 rounded-full shadow-2xl text-white text-sm font-bold flex items-center space-x-2 ${type==='success'?'bg-green-600':'bg-red-600'}`;
            el.innerHTML = `<span>${msg}</span>`;
            dom.toasts.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(()=>el.remove(), 300); }, 3000);
        }

        function runQuery() {
            let sql = dom.editor.value.trim();
            if (!sql) return;

            if (sql.toLowerCase().startsWith('describe ')) {
                sql = `PRAGMA table_info(${sql.split(' ')[1].replace(';', '')});`;
            }

            [dom.empty, dom.error, dom.table, dom.success].forEach(el => el.classList.add('hidden'));

            try {
                const res = db.exec(sql);
                if (res.length > 0) {
                    const data = res[res.length - 1];
                    dom.table.classList.remove('hidden');
                    dom.head.innerHTML = `<tr>${data.columns.map(c => `<th class="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase border-b border-slate-200">${c}</th>`).join('')}</tr>`;
                    dom.body.innerHTML = data.values.map(r => `<tr>${r.map(v => `<td class="px-4 py-3 text-sm text-slate-600 border-b border-slate-50">${v??'NULL'}</td>`).join('')}</tr>`).join('');
                    dom.meta.innerText = `${data.values.length} results`;
                } else {
                    dom.success.classList.remove('hidden');
                    dom.successText.innerText = "Query executed successfully.";
                    dom.meta.innerText = "Success";
                    toast("Done!");
                }
                updateUI();
            } catch (e) {
                dom.error.classList.remove('hidden');
                dom.error.innerText = e.message;
                dom.meta.innerText = "Error";
                toast("SQL Error", "error");
            }
        }

        function updateUI() {
            const tables = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
            if (tables.length === 0 || tables[0].values.length === 0) {
                dom.schema.innerHTML = `<p class="text-slate-400 text-xs italic">Empty database</p>`;
                return;
            }
            dom.schema.innerHTML = tables[0].values.map(t => {
                const count = db.exec(`SELECT COUNT(*) FROM ${t[0]}`)[0].values[0][0];
                return `<div class="border border-slate-100 rounded-lg p-2 bg-white flex justify-between items-center group">
                    <span class="text-xs font-bold text-slate-700">${t[0]}</span>
                    <div class="flex items-center space-x-2">
                        <span class="text-[9px] font-mono text-slate-400">${count} rows</span>
                        <button onclick="view('${t[0]}')" class="text-indigo-500 hover:text-indigo-700 p-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg></button>
                    </div>
                </div>`;
            }).join('');
        }

        function view(name) { dom.editor.value = `SELECT * FROM ${name};`; runQuery(); }
        function clearEditor() { dom.editor.value = ""; dom.editor.focus(); }
        function resetDatabase() { if (confirm("Factory reset? This will reload the page.")) { sessionStorage.setItem('reset_toast', 'true'); location.reload(); } }

        window.onload = init;
    </script>
</body>
</html>
